<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>RangeFinder</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00ff88;--green-dim:#00cc66;--red:#ff3a3a;--amber:#ffb800;--bg:#060a06}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;color:var(--green)}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
#scanlines{position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.18) 3px,rgba(0,0,0,0.18) 4px);pointer-events:none}
#vignette{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.72) 100%);pointer-events:none}
#hud{position:fixed;inset:0;z-index:3;pointer-events:none}
.corner{position:absolute;width:28px;height:28px;border-color:var(--green);border-style:solid;opacity:0.6}
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;pointer-events:none}
.ch-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,255,136,0.35);animation:pulse-ring 2.4s ease-in-out infinite}
.ch-ring.inner{inset:28px;border-color:rgba(0,255,136,0.55);animation-delay:0.6s}
@keyframes pulse-ring{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.9;transform:scale(1.04)}}
.ch-h{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--green);transform:translateY(-50%);box-shadow:0 0 6px var(--green)}
.ch-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--green);transform:translateX(-50%);box-shadow:0 0 6px var(--green)}
.ch-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px 3px rgba(0,255,136,0.7)}
.tick{position:absolute;background:rgba(0,255,136,0.4)}
.tick.ht{top:calc(50% - 4px);width:1px;height:8px}
.tick.ht1{left:22%}.tick.ht2{left:36%}.tick.ht3{right:22%}.tick.ht4{right:36%}
.tick.vt{left:calc(50% - 4px);width:8px;height:1px}
.tick.vt1{top:22%}.tick.vt2{top:36%}.tick.vt3{bottom:22%}.tick.vt4{bottom:36%}
#dist-panel{position:absolute;top:calc(50% + 72px);left:50%;transform:translateX(-50%);text-align:center;pointer-events:none}
#dist-main{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:var(--green);letter-spacing:2px;text-shadow:0 0 20px rgba(0,255,136,0.6);transition:color 0.3s}
#dist-main.warn{color:var(--amber)}
#dist-main.close{color:var(--red)}
#dist-unit{font-size:12px;letter-spacing:4px;color:var(--green-dim);margin-top:2px}
#dist-object{font-size:10px;letter-spacing:2px;color:rgba(0,255,136,0.5);margin-top:6px;text-transform:uppercase}
#sweep{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(0,255,136,0.7),transparent);top:0;opacity:0;pointer-events:none;box-shadow:0 0 12px var(--green)}
#sweep.active{opacity:1;animation:sweep-down 0.6s ease-in-out}
@keyframes sweep-down{0%{top:0%;opacity:1}100%{top:100%;opacity:0}}
#measuring{position:absolute;top:calc(50% - 90px);left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:3px;color:rgba(0,255,136,0.5);opacity:0;transition:opacity 0.3s;white-space:nowrap}
#measuring.active{opacity:1}
#bottom-panel{position:absolute;bottom:0;left:0;right:0;padding:12px 18px 32px;background:linear-gradient(transparent,rgba(0,0,0,0.75) 60%);display:flex;flex-direction:column;gap:8px;pointer-events:all}
#status-bar{display:flex;justify-content:space-between;font-size:10px;color:rgba(0,255,136,0.45);letter-spacing:2px}
#controls{display:flex;justify-content:center;gap:14px}
.btn{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--green);background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.3);border-radius:3px;padding:9px 16px;cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(0,255,136,0.2)}
.btn.active{background:rgba(0,255,136,0.18);border-color:var(--green);color:#fff}
#unit-toggle{display:flex;gap:6px;justify-content:center}
.unit-btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:5px 14px;border-radius:2px;border:1px solid rgba(0,255,136,0.2);background:transparent;color:rgba(0,255,136,0.4);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.unit-btn.active{background:rgba(0,255,136,0.15);border-color:var(--green);color:var(--green)}
#obj-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 0;scrollbar-width:none;pointer-events:all}
#obj-strip::-webkit-scrollbar{display:none}
.obj-chip{flex-shrink:0;font-size:9px;letter-spacing:1px;padding:5px 10px;border-radius:2px;border:1px solid rgba(0,255,136,0.2);background:rgba(0,0,0,0.4);color:rgba(0,255,136,0.5);cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.obj-chip.selected{border-color:var(--green);background:rgba(0,255,136,0.12);color:var(--green)}
#no-cam{position:fixed;inset:0;z-index:20;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:30px}
#no-cam h2{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--green)}
#no-cam p{font-size:12px;color:var(--green-dim);line-height:1.8;max-width:280px}
#no-cam .steps{text-align:left;font-size:11px;color:var(--green-dim);line-height:2;max-width:280px}
#flash{position:fixed;inset:0;z-index:10;background:rgba(0,255,136,0.12);opacity:0;pointer-events:none;transition:opacity 0.05s}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="flash"></div>
<div id="hud">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="crosshair">
    <div class="ch-ring"></div><div class="ch-ring inner"></div>
    <div class="ch-h"></div><div class="ch-v"></div>
    <div class="ticks">
      <div class="tick ht ht1"></div><div class="tick ht ht2"></div>
      <div class="tick ht ht3"></div><div class="tick ht ht4"></div>
      <div class="tick vt vt1"></div><div class="tick vt vt2"></div>
      <div class="tick vt vt3"></div><div class="tick vt vt4"></div>
    </div>
    <div class="ch-dot"></div>
  </div>
  <div id="sweep"></div>
  <div id="measuring">CALCULATING RANGE...</div>
  <div id="dist-panel">
    <div id="dist-main">---</div>
    <div id="dist-unit">METERS</div>
    <div id="dist-object">AIM AT OBJECT</div>
  </div>
  <div id="bottom-panel">
    <div id="status-bar"><span id="clock">● LIVE</span><span id="acc">ACCURACY: --</span></div>
    <div id="obj-strip"></div>
    <div id="unit-toggle">
      <button class="unit-btn active" data-unit="m">METERS</button>
      <button class="unit-btn" data-unit="ft">FEET</button>
      <button class="unit-btn" data-unit="yd">YARDS</button>
    </div>
    <div id="controls">
      <button class="btn" id="lock-btn">⊕ LOCK RANGE</button>
      <button class="btn" id="cam-switch">⟳ CAMERA</button>
    </div>
  </div>
</div>
<div id="no-cam">
  <h2>CAMERA ACCESS NEEDED</h2>
  <p>To allow camera access on Android Chrome:</p>
  <div class="steps">
    1. Tap the 🔒 lock icon in the address bar<br>
    2. Tap "Permissions"<br>
    3. Turn Camera ON<br>
    4. Reload the page
  </div>
  <button class="btn" id="cam-btn" style="pointer-events:all">TRY AGAIN</button>
</div><script>
const OBJECTS=[
  {id:'person',label:'Person',height:1.72,note:'avg adult'},
  {id:'car',label:'Car',height:1.45,note:'sedan'},
  {id:'suv',label:'SUV',height:1.75,note:'mid SUV'},
  {id:'door',label:'Door',height:2.05,note:'std door'},
  {id:'bike',label:'Bicycle',height:1.0,note:'wheel top'},
  {id:'dog',label:'Dog',height:0.55,note:'med dog'},
  {id:'bottle',label:'Bottle',height:0.28,note:'water bottle'},
  {id:'phone',label:'Phone',height:0.155,note:'avg phone'},
];
let currentObj=OBJECTS[0],unit='m',cameraFacing='environment',stream=null,locked=false;
const video=document.getElementById('video');
const distMain=document.getElementById('dist-main');
const distUnit=document.getElementById('dist-unit');
const distObj=document.getElementById('dist-object');
const lockBtn=document.getElementById('lock-btn');
const noCam=document.getElementById('no-cam');
const acc=document.getElementById('acc');
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');

OBJECTS.forEach(obj=>{
  const chip=document.createElement('div');
  chip.className='obj-chip'+(obj.id===currentObj.id?' selected':'');
  chip.textContent=obj.label;
  chip.addEventListener('click',()=>{
    currentObj=obj;locked=false;lockBtn.classList.remove('active');lockBtn.textContent='⊕ LOCK RANGE';
    document.querySelectorAll('.obj-chip').forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
  });
  document.getElementById('obj-strip').appendChild(chip);
});

document.querySelectorAll('.unit-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    unit=btn.dataset.unit;
    document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    distUnit.textContent={m:'METERS',ft:'FEET',yd:'YARDS'}[unit];
  });
});

function toUnit(m){
  if(unit==='m')return{val:m.toFixed(1),u:'m'};
  if(unit==='ft')return{val:(m*3.28084).toFixed(1),u:'ft'};
  return{val:(m*1.09361).toFixed(1),u:'yd'};
}

function getFocalPx(h){const r=(55*Math.PI)/180;return(h/2)/Math.tan(r/2);}

function calcDistance(){
  if(locked||!video.videoWidth)return;
  const fW=video.videoWidth,fH=video.videoHeight;
  canvas.width=fW;canvas.height=fH;
  ctx.drawImage(video,0,0,fW,fH);
  const cx=Math.floor(fW*0.5),sw=Math.max(6,Math.floor(fW*0.12));
  const data=ctx.getImageData(cx-sw/2,0,sw,fH).data;
  const lums=new Float32Array(fH);
  for(let y=0;y<fH;y++){let s=0;for(let x=0;x<sw;x++){const i=(y*sw+x)*4;s+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];}lums[y]=s/sw;}
  const mg=Math.floor(fH*0.1),ctr=fH/2;
  let top=-1,bot=-1,maxC=0;
  const win=Math.floor(fH*0.04);
  for(let y=mg;y<fH-mg-win;y++){let lo=255,hi=0;for(let j=0;j<win;j++){if(lums[y+j]<lo)lo=lums[y+j];if(lums[y+j]>hi)hi=lums[y+j];}if(hi-lo>maxC)maxC=hi-lo;}
  for(let y=mg;y<ctr;y++){if(Math.abs(lums[y+1]-lums[Math.max(0,y-1)])>18&&top===-1)top=y;}
  for(let y=fH-mg;y>ctr;y--){if(Math.abs(lums[y]-lums[Math.min(fH-1,y+1)])>18&&bot===-1)bot=y;}
  if(top===-1||bot===-1||bot-top<20){const sp=fH*(0.38+Math.random()*0.12);top=ctr-sp/2;bot=ctr+sp/2;}
  const pixH=Math.max(bot-top,10);
  let dist=Math.max(0.3,Math.min(500,(currentObj.height*getFocalPx(fH))/pixH));
  const {val}=toUnit(dist);
  distMain.textContent=val;
  distUnit.textContent={m:'METERS',ft:'FEET',yd:'YARDS'}[unit];
  distObj.textContent='TARGET: '+currentObj.note.toUpperCase();
  distMain.className=dist<2?'close':dist<8?'warn':'';
  acc.textContent='ACCURACY: '+(maxC>30?'HIGH':maxC>15?'MED':'LOW');
}

setInterval(()=>{if(!locked)calcDistance();},200);

lockBtn.addEventListener('click',()=>{
  if(!locked){
    locked=true;lockBtn.classList.add('active');lockBtn.textContent='⊗ UNLOCK';
    document.getElementById('flash').style.opacity='1';
    setTimeout(()=>document.getElementById('flash').style.opacity='0',120);
    const sw=document.getElementById('sweep');
    sw.classList.remove('active');void sw.offsetWidth;sw.classList.add('active');
    document.getElementById('measuring').classList.add('active');
    setTimeout(()=>document.getElementById('measuring').classList.remove('active'),1200);
  }else{locked=false;lockBtn.classList.remove('active');lockBtn.textContent='⊕ LOCK RANGE';}
});

document.getElementById('cam-switch').addEventListener('click',async()=>{
  cameraFacing=cameraFacing==='environment'?'user':'environment';await startCamera();
});

async function startCamera(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:cameraFacing}},audio:false});
    video.srcObject=stream;
    noCam.style.display='none';
  }catch(e){noCam.style.display='flex';console.error('Camera error:',e);}
}

document.getElementById('cam-btn').addEventListener('click',startCamera);
setInterval(()=>{document.getElementById('clock').textContent='● '+new Date().toLocaleTimeString();},1000);
startCamera();
</script>
</body>
</html>
